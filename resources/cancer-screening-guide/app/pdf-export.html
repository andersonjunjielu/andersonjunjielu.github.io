<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Your Screening Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --paper: #FAF7F2;
    --ink: #1B2530;
    --ink-2: #4A5560;
    --ink-3: #8A8F96;
    --line: rgba(27, 37, 48, 0.10);
    --line-2: rgba(27, 37, 48, 0.18);
    --primary: #2F5D5A;
    --primary-soft: #E8EFEE;
    --accent: #D4623A;
    --accent-soft: #F7E7DC;
    --warn: #B85C38;
    --do-now: #2F5D5A;
    --do-soon: #B8704A;
    --discuss: #6E5A85;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: #EDE8E0;
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }
  .serif {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-weight: 400;
  }

  /* Toolbar — only on screen */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .toolbar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    flex: 1;
  }
  .toolbar-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--line-2);
    background: white;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .toolbar-btn:hover { background: var(--primary-soft); }
  .toolbar-btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .toolbar-btn.primary:hover { background: #234846; }

  /* Page — Letter size 8.5" × 11" = 816px × 1056px at 96dpi */
  .page {
    width: 816px;
    min-height: 1056px;
    margin: 24px auto;
    background: white;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    padding: 64px 72px;
    position: relative;
    page-break-after: always;
  }
  .page:last-of-type { page-break-after: auto; }

  /* Cover header */
  .cover-rule {
    height: 2px;
    background: var(--ink);
    margin-bottom: 28px;
  }
  .cover-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 18px;
  }
  .cover-title {
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 24px;
    font-weight: 500;
    max-width: 580px;
  }
  .cover-title .serif { color: var(--primary); }
  .cover-sub {
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 560px;
    margin-bottom: 40px;
  }

  /* Inventory card on cover */
  .inv-card {
    background: var(--paper);
    border-left: 3px solid var(--primary);
    padding: 24px 28px;
    margin-bottom: 32px;
  }
  .inv-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    align-items: baseline;
  }
  .inv-row:last-child { border-bottom: none; }
  .inv-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }
  .inv-value {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }
  .inv-value.serif {
    font-size: 17px;
    color: var(--primary);
  }

  /* Doctor letter card */
  .letter-card {
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 8px;
    position: relative;
  }
  .letter-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .letter-eyebrow {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .letter-body {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
  }
  .letter-body .serif {
    color: var(--accent);
    font-size: 17px;
  }

  /* Section header on later pages */
  .section-eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -0.015em;
    margin: 0 0 12px;
    font-weight: 500;
    color: var(--ink);
  }
  .section-title .serif { color: var(--primary); }
  .section-sub {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-2);
    margin-bottom: 32px;
    max-width: 560px;
  }

  /* Recommendation cards */
  .rec-group { margin-bottom: 36px; }
  .rec-group-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .rec-group-dot {
    width: 10px; height: 10px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .rec-group-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .rec-group-count {
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }

  .rec-card {
    border-bottom: 1px solid var(--line);
    padding: 18px 0;
    display: grid;
    grid-template-columns: 1fr 180px;
    gap: 32px;
    page-break-inside: avoid;
  }
  .rec-card:last-child { border-bottom: none; }
  .rec-name {
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .rec-because {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-2);
    margin-bottom: 10px;
  }
  .rec-because-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 600;
    margin-right: 6px;
  }
  .rec-what {
    font-size: 12px;
    color: var(--ink-3);
    line-height: 1.55;
    font-style: italic;
  }
  .rec-meta {
    text-align: right;
    border-left: 1px solid var(--line);
    padding-left: 24px;
  }
  .rec-cadence {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .rec-cadence-val {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .rec-source {
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.45;
  }

  /* Conversation script */
  .script-line {
    margin-bottom: 18px;
    padding-left: 16px;
    border-left: 2px solid var(--line);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
  }
  .script-line .serif { color: var(--primary); }

  /* Footer */
  .page-footer {
    position: absolute;
    bottom: 32px;
    left: 72px;
    right: 72px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }
  .page-footer-brand {
    font-weight: 500;
    color: var(--primary);
  }

  /* Print rules */
  @media print {
    @page { size: letter; margin: 0; }
    body { background: white; }
    .toolbar { display: none; }
    .page {
      margin: 0;
      box-shadow: none;
      width: 100%;
      min-height: 100vh;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Your screening guide · ready to print</div>
  <button class="toolbar-btn" onclick="window.close()">Close</button>
  <button class="toolbar-btn primary" onclick="window.print()">
    Print or save as PDF
  </button>
</div>

<div id="content"></div>

<script>
(function() {
  // Read data — try opener first, fall back to sessionStorage, then a demo default
  // Read data — try injected window.__pdfData first, then opener, then sessionStorage, then demo
  let payload = null;
  try {
    if (window.__pdfData) payload = window.__pdfData;
  } catch (e) {}
  if (!payload) {
    try {
      if (window.opener && window.opener.__pdfData) payload = window.opener.__pdfData;
    } catch (e) {}
  }
  if (!payload) {
    try {
      const raw = sessionStorage.getItem('__pdfData');
      if (raw) payload = JSON.parse(raw);
    } catch (e) {}
  }
  if (!payload) {
    // Demo fallback
    payload = {
      identityLabel: 'Trans woman',
      pronouns: 'she/her',
      age: 47,
      organList: ['Breasts', 'Prostate', 'Colon', 'Lungs'],
      hpv: 'no',
      smoked: false,
      familyMembers: [],
      recs: [
        { id: 'mammogram', title: 'Mammogram', cadence: 'Every 1–2 years',
          because: 'You have breast tissue. Anyone with breast tissue can develop breast cancer — including trans women on estrogen.',
          what: 'A low-dose X-ray of the chest. Takes about 20 minutes.',
          priority: 'soon' },
        { id: 'prostate', title: 'Prostate screening', cadence: 'Discuss with your doctor',
          because: 'You have a prostate. Trans women on estrogen still have one — surgery rarely removes it.',
          what: 'Usually a PSA blood test. Talk through pros & cons with your doctor.',
          priority: 'discuss' },
        { id: 'colorectal', title: 'Colorectal screening', cadence: 'Every 1–10 years',
          because: 'Everyone has a colon. Risk goes up with age regardless of gender.',
          what: 'At-home stool test (yearly), sigmoidoscopy (5 yr), or colonoscopy (10 yr).',
          priority: 'now' },
        { id: 'sti', title: 'Sexual health check', cadence: 'Yearly, or with new partners',
          because: 'Recommended for everyone who is sexually active.',
          what: 'Urine sample, blood test, or swab. You choose what’s screened.',
          priority: 'soon' },
      ],
    };
  }

  const PRIORITY_GROUPS = {
    now:     { label: 'Do now',                    sub: 'In your screening window — schedule these.', color: '#2F5D5A' },
    soon:    { label: 'Coming soon',               sub: 'On the horizon. Worth pre-booking.',          color: '#B8704A' },
    discuss: { label: 'Worth a conversation',      sub: 'Talk through pros & cons with your doctor.',  color: '#6E5A85' },
  };

  const PRIORITY_ORDER = ['now', 'soon', 'discuss'];
  const SOURCE_MAP = {
    mammogram: 'USPSTF 2024 · ACS 2023',
    cervical: 'USPSTF 2018 · ACS 2020',
    prostate: 'USPSTF 2018',
    colorectal: 'USPSTF 2021',
    lung: 'USPSTF 2021',
    sti: 'CDC STI Treatment Guidelines',
    genetic: 'NCCN · NSGC',
  };

  // Group recommendations
  const grouped = { now: [], soon: [], discuss: [] };
  payload.recs.forEach(r => {
    const p = r.priority === 'high' ? 'now' : r.priority === 'soon' ? 'soon' : 'discuss';
    grouped[p].push(r);
  });

  // Date string
  const dateStr = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  // History summary lines
  const historyLines = [];
  if (payload.smoked === true) historyLines.push('Has smoked regularly');
  else if (payload.smoked === false) historyLines.push('Never smoked regularly');
  if (payload.hpv === 'yes') historyLines.push('HPV vaccine: full series');
  else if (payload.hpv === 'partial') historyLines.push('HPV vaccine: partial series');
  else if (payload.hpv === 'no') historyLines.push('HPV vaccine: not received');
  else if (payload.hpv === 'unsure') historyLines.push('HPV vaccine: unsure');
  if (payload.familyMembers && payload.familyMembers.length && !payload.familyMembers.includes('none')) {
    historyLines.push('Cancer in close family');
  } else if (payload.familyMembers) {
    historyLines.push('No cancer in close family');
  }

  // Build content
  const html = `
    <!-- ============ PAGE 1: COVER + LETTER TO DOCTOR ============ -->
    <div class="page">
      <div class="cover-rule"></div>
      <div class="cover-eyebrow">Personal screening guide · ${dateStr}</div>

      <h1 class="cover-title">
        Cancer screening, <span class="serif">made for your body.</span>
      </h1>
      <p class="cover-sub">
        This document was generated from your own answers — not assumed from your gender or paperwork.
        Bring it to your appointment, hand the phone to your doctor, or print it for your records.
      </p>

      <!-- Patient inventory -->
      <div class="inv-card">
        <div class="inv-row">
          <div class="inv-label">Identity</div>
          <div class="inv-value serif">${escapeHTML(payload.identityLabel)}</div>
        </div>
        ${payload.pronouns ? `
        <div class="inv-row">
          <div class="inv-label">Pronouns</div>
          <div class="inv-value">${escapeHTML(payload.pronouns)}</div>
        </div>` : ''}
        <div class="inv-row">
          <div class="inv-label">Age</div>
          <div class="inv-value">${payload.age}</div>
        </div>
        <div class="inv-row">
          <div class="inv-label">Anatomy</div>
          <div class="inv-value">${(payload.organList || []).join(' · ') || 'Not specified'}</div>
        </div>
        ${historyLines.length ? `
        <div class="inv-row">
          <div class="inv-label">Risk factors</div>
          <div class="inv-value" style="font-size: 13px; color: var(--ink-2); font-weight: 400;">${historyLines.join(' · ')}</div>
        </div>` : ''}
      </div>

      <!-- Letter to doctor -->
      <div class="letter-card">
        <div class="letter-eyebrow">A note for your clinician</div>
        <div class="letter-body">
          Hi — I'm a ${payload.age}-year-old patient.
          I identify as <span class="serif">${escapeHTML(payload.identityLabel.toLowerCase())}</span>.
          So you don't have to guess, here's an inventory of the organs I currently have:
          <strong>${(payload.organList || []).join(', ')}</strong>.
          I'd like to talk about cancer screenings appropriate for my body —
          this guide lists what current evidence-based guidelines suggest for someone with my anatomy and history.
        </div>
      </div>

      <div class="page-footer">
        <span class="page-footer-brand">Screening for Every Body</span>
        <span>Page 1 · Generated ${dateStr}</span>
      </div>
    </div>

    <!-- ============ PAGE 2: SCREENING PLAN ============ -->
    <div class="page">
      <div class="cover-rule"></div>
      <div class="section-eyebrow">Your plan</div>
      <h2 class="section-title">What to do, <span class="serif">in order.</span></h2>
      <p class="section-sub">
        Recommendations are grouped by urgency. Each is matched to the organs you currently have
        and to your age, history, and family risk. Sources noted below each item.
      </p>

      ${PRIORITY_ORDER.map(p => {
        const items = grouped[p];
        if (!items.length) return '';
        const meta = PRIORITY_GROUPS[p];
        return `
          <div class="rec-group">
            <div class="rec-group-head">
              <div class="rec-group-dot" style="background: ${meta.color}"></div>
              <div class="rec-group-title">${meta.label}</div>
              <div class="rec-group-count">${items.length} ${items.length === 1 ? 'item' : 'items'} · ${meta.sub}</div>
            </div>
            ${items.map(r => `
              <div class="rec-card">
                <div>
                  <h3 class="rec-name">${escapeHTML(r.title)}</h3>
                  <div class="rec-because">
                    <span class="rec-because-label">Why for you</span>
                    ${escapeHTML(r.because)}
                  </div>
                  <div class="rec-what">${escapeHTML(r.what)}</div>
                </div>
                <div class="rec-meta">
                  <div class="rec-cadence">Frequency</div>
                  <div class="rec-cadence-val">${escapeHTML(r.cadence)}</div>
                  <div class="rec-source">Source<br/>${SOURCE_MAP[r.id] || 'See clinician'}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('')}

      <div class="page-footer">
        <span class="page-footer-brand">Screening for Every Body</span>
        <span>Page 2 · ${(payload.organList||[]).length} organs · ${payload.recs.length} recommendations</span>
      </div>
    </div>

    <!-- ============ PAGE 3: CONVERSATION SCRIPT ============ -->
    <div class="page">
      <div class="cover-rule"></div>
      <div class="section-eyebrow">In the room</div>
      <h2 class="section-title">If you don't know <span class="serif">what to say.</span></h2>
      <p class="section-sub">
        These are first-person openers you can read aloud. Adapt them to fit your voice — the goal is
        to skip the awkward preamble and get to the medicine.
      </p>

      <div class="script-line">
        <span class="serif">Opening:</span><br/>
        "Hi — before we start, I want to make sure we're on the same page about my body so we can talk
        about screening that actually applies to me. I have ${(payload.organList || []).join(', ')}.
        I'd like to focus this visit on what's appropriate for me, given that."
      </div>

      ${grouped.now.length ? `
      <div class="script-line">
        <span class="serif">If they offer something off-list:</span><br/>
        "Thanks for offering that. Based on guidelines for someone with my anatomy and age, my priorities
        right now are ${grouped.now.map(r => r.title.toLowerCase()).join(', ')}. Could we start there?"
      </div>` : ''}

      ${grouped.discuss.length ? `
      <div class="script-line">
        <span class="serif">For shared-decision items:</span><br/>
        "I'd like a real conversation about ${grouped.discuss.map(r => r.title.toLowerCase()).join(' and ')} —
        not a yes/no, but the actual pros and cons for someone like me."
      </div>` : ''}

      <div class="script-line">
        <span class="serif">If something feels rushed or dismissive:</span><br/>
        "Can we slow down for a second? I'd like to understand the reasoning before we move on."
      </div>

      <div class="script-line">
        <span class="serif">Closing:</span><br/>
        "Could you put the screening plan in my chart so the next clinician I see has the same picture?"
      </div>

      <div style="margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--line); font-size: 12px; color: var(--ink-3); line-height: 1.6;">
        <strong style="color: var(--ink-2);">A note about this guide</strong><br/>
        Generated from your own answers on ${dateStr}. Recommendations follow current USPSTF and ACS
        guidelines as of the build date — your clinician knows your full picture and may adjust based on
        new evidence or your specific circumstances. Nothing in this document was saved to a server.
      </div>

      <div class="page-footer">
        <span class="page-footer-brand">Screening for Every Body</span>
        <span>Page 3 · For your records</span>
      </div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;

  function escapeHTML(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }
})();
</script>

</body>
</html>
