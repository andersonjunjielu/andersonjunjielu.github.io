<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cancer Screening Guide — Web</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />

<style>
/* ═════════════════════════════════════════════════════════════════
   Cancer Screening Guide — WEB VERSION
   Continues mobile's visual language: Newsreader italic, ambient
   aura blobs, themable tokens, calm warmth.
   ═════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&display=swap');

:root {
  /* defaults — runtime applies one of WEB_THEMES per user pick */
  --bg: #F4F1EC;
  --surface: #FFFFFF;
  --surface-2: #FAF7F2;
  --ink: #1B2530;
  --ink-2: #4A5560;
  --ink-3: #8A8F96;
  --line: rgba(27,37,48,0.08);
  --line-2: rgba(27,37,48,0.14);
  --primary: #2F5D5A;
  --primary-soft: #E8EFEE;
  --accent: #D4623A;

  --serif: 'Newsreader', 'Iowan Old Style', Georgia, serif;
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  --col-left: 320px;
  --col-gap: 64px;
  --col-right: 640px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100vh; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
  position: relative;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   Ambient aura blobs (the "light halo" effect from mobile)
   Three slow-drifting radial-gradient blobs behind everything.
   ═══════════════════════════════════════════════════════════════ */
.aura-wrap {
  position: fixed; inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.aura {
  position: absolute;
  border-radius: 50%;
  filter: blur(96px);
  opacity: 0.35;
  transition: opacity 1.8s ease;
}
.aura-1 {
  width: 540px; height: 540px;
  top: -200px; left: -180px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  animation: webFloat1 22s ease-in-out infinite alternate;
}
.aura-2 {
  width: 600px; height: 600px;
  top: 240px; right: -240px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  animation: webFloat2 26s ease-in-out infinite alternate;
  opacity: 0.28;
}
.aura-3 {
  width: 520px; height: 520px;
  bottom: -200px; left: 180px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  animation: webFloat3 30s ease-in-out infinite alternate;
  opacity: 0.22;
}
@keyframes webFloat1 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(120px, 60px) scale(1.15); }
}
@keyframes webFloat2 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-100px, 120px) scale(1.1); }
}
@keyframes webFloat3 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(80px, -80px) scale(1.2); }
}

/* Page sits above the aura */
header.topbar, main.stage, .welcome-stage, .results-stage, .modal-backdrop {
  position: relative; z-index: 1;
}

/* ═══════════════════════════════════════════════════════════════
   Topbar — frosted, with theme pill + lang toggle
   ═══════════════════════════════════════════════════════════════ */
header.topbar {
  padding: 16px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 50;
}
.topbar-mark {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
  display: flex; align-items: center; gap: 10px;
  letter-spacing: -0.005em;
}
.topbar-mark .dot {
  width: 7px; height: 7px;
  background: var(--primary);
  border-radius: 50%;
  display: inline-block;
}
.topbar-mark .sep {
  color: var(--ink-3);
  font-size: 12px;
  margin: 0 2px;
}
.topbar-mark a { color: var(--ink); text-decoration: none; }
.topbar-mark a:hover { color: var(--primary); }
.topbar-mark .ital {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  color: var(--primary);
}
.topbar-actions { display: flex; align-items: center; gap: 14px; }
.topbar-link {
  font-size: 13px; font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  background: none; border: none;
  padding: 6px 0;
  font-family: inherit;
}
.topbar-link:hover { color: var(--primary); }

/* Theme pill (in topbar) — ring of swatches */
.theme-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px 6px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--line);
  cursor: pointer;
  font-family: inherit;
}
.theme-pill:hover { border-color: var(--line-2); }
.theme-swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
}
.theme-pill-label {
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  letter-spacing: 0.02em;
}
.theme-pill-popover {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 8px;
  display: flex; flex-direction: column; gap: 2px;
  box-shadow: 0 12px 40px rgba(20, 15, 10, 0.10);
  min-width: 160px;
  z-index: 60;
}
.theme-pill-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none; background: none;
  cursor: pointer;
  font-family: inherit; font-size: 13px;
  color: var(--ink);
  text-align: left;
}
.theme-pill-row:hover { background: var(--surface-2); }
.theme-pill-row.is-active { background: var(--primary-soft); color: var(--primary); font-weight: 500; }

/* Lang toggle pill */
.lang-pill-mini {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 14px;
  cursor: pointer;
}
.lang-pill-mini:hover { border-color: var(--primary); color: var(--primary); }
.lang-pill-mini .ital {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  color: var(--primary);
  margin: 0 2px;
}

/* ═══════════════════════════════════════════════════════════════
   Welcome screen — language picker, big serif hello
   ═══════════════════════════════════════════════════════════════ */
.welcome-stage {
  max-width: 760px;
  margin: 0 auto;
  padding: 80px 32px 80px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.welcome-clinic {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 36px;
  font-weight: 500;
}
.welcome-headline {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin: 0 0 36px;
  max-width: 9ch;
  text-align: center;
  min-height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.welcome-headline-cycle {
  display: inline-block;
  animation: welcomeHeadlineFade 2.4s ease-in-out;
}
@keyframes welcomeHeadlineFade {
  0%   { opacity: 0; transform: translateY(8px); }
  15%  { opacity: 1; transform: translateY(0); }
  85%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-8px); }
}

/* ── Floating multilingual hellos (background ambient) ── */
.welcome-hellos-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.welcome-hello-float {
  position: absolute;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  color: var(--primary);
  white-space: nowrap;
  opacity: 0;
  letter-spacing: -0.02em;
  transform-origin: center;
  animation: welcomeHelloPulse 9s ease-in-out infinite both;
}
@keyframes welcomeHelloPulse {
  0%   { opacity: 0; transform: translateY(8px) scale(0.96); }
  20%  { opacity: var(--peak, 0.22); transform: translateY(0) scale(1); }
  70%  { opacity: var(--peak, 0.22); transform: translateY(-6px) scale(1); }
  100% { opacity: 0; transform: translateY(-14px) scale(0.94); }
}

/* ── Language pill picker ── */
.welcome-lang-pill-wrap {
  position: relative;
  margin-bottom: 28px;
}
.welcome-lang-pill {
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 6px 24px rgba(0,0,0,0.04);
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  font-size: 14px;
  color: var(--ink);
}
.welcome-lang-pill:hover {
  border-color: var(--primary);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 28px rgba(0,0,0,0.06);
}
.welcome-lang-pill-hello {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--primary);
  line-height: 1;
}
.welcome-lang-pill-native {
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-2);
  font-weight: 500;
}
.welcome-lang-pill-chev {
  font-size: 10px;
  color: var(--ink-3);
  margin-left: 4px;
}
.welcome-lang-pop {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  padding: 6px;
  display: grid;
  grid-template-columns: repeat(2, minmax(160px, 1fr));
  gap: 2px;
  min-width: 360px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 5;
}
.welcome-lang-pop-item {
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  background: transparent;
  border: 0;
  border-radius: 9px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink);
  text-align: left;
}
.welcome-lang-pop-item:hover { background: var(--surface-2); }
.welcome-lang-pop-item.is-active { background: var(--primary-soft); color: var(--primary); }
.welcome-lang-pop-item span:first-child {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
}
.welcome-cta {
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  background: var(--primary);
  border: none;
  border-radius: 999px;
  padding: 16px 36px;
  cursor: pointer;
  transition: filter 0.15s, transform 0.15s, background 0.3s;
  letter-spacing: -0.005em;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.welcome-cta:hover { filter: brightness(1.08); }
.welcome-cta::after {
  content: "→";
  transition: transform 0.15s;
}
.welcome-cta:hover::after { transform: translateX(4px); }

.welcome-meta {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 48px;
  justify-content: center;
  margin-top: 56px;
  font-size: 13px;
  color: var(--ink-2);
  flex-wrap: wrap;
}
.welcome-meta-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.welcome-meta-key {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}

/* ═══════════════════════════════════════════════════════════════
   Stage — two-column layout (intake)
   ═══════════════════════════════════════════════════════════════ */
main.stage {
  max-width: 1180px;
  margin: 0 auto;
  padding: 64px 36px 96px;
  display: grid;
  grid-template-columns: var(--col-left) 1fr;
  gap: var(--col-gap);
  align-items: start;
}

/* ─── Left: stepper + context ─── */
aside.stepper {
  position: sticky;
  top: 96px;
  font-size: 14px;
  color: var(--ink-2);
}
.stepper-progress {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 28px;
}
.stepper-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 36px;
  border-left: 1px solid var(--line);
  padding-left: 18px;
  position: relative;
}
.stepper-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 7px 0;
  font-size: 14px;
  color: var(--ink-3);
  cursor: pointer;
  background: none; border: none;
  font-family: inherit;
  text-align: left;
  position: relative;
  transition: color 0.15s;
  letter-spacing: -0.005em;
}
.stepper-item:hover:not(:disabled) { color: var(--ink-2); }
.stepper-item.is-current {
  color: var(--ink);
  font-weight: 500;
}
.stepper-item.is-current::before {
  content: "";
  position: absolute;
  left: -19px; top: 50%;
  width: 2px; height: 22px;
  background: var(--primary);
  transform: translateY(-50%);
  border-radius: 2px;
}
.stepper-item.is-done { color: var(--ink-2); }
.stepper-item.is-done::after {
  content: "";
  display: inline-block;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--primary-soft);
  border: 1.5px solid var(--primary);
  margin-left: 6px;
  position: relative;
  top: 2px;
}
.stepper-num {
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  color: var(--ink-3);
  min-width: 18px;
  font-family: var(--sans);
  font-weight: 500;
}
.stepper-item.is-current .stepper-num { color: var(--primary); }

.stepper-context {
  margin-top: 32px;
  padding: 22px 22px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-2);
}
.stepper-context-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--primary);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.stepper-context p { margin: 0; }

/* ─── Right: question card ─── */
.qcard {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 52px 56px;
  min-height: 580px;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 24px 56px rgba(20, 15, 10, 0.04);
}
.qcard-meta {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 18px;
}
.qcard h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 40px;
  line-height: 1.12;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  color: var(--ink);
  text-wrap: pretty;
}
.qcard h1 em, .qcard h1 .serif {
  font-style: italic;
  color: var(--primary);
}
.qcard .qsub {
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 36px;
  max-width: 540px;
}

.qcard-body { flex: 1; }

.qcard-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 36px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
}
.qcard-foot-left, .qcard-foot-right {
  display: flex; align-items: center; gap: 12px;
}

/* ─── Buttons ─── */
.btn {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.005em;
  padding: 13px 24px;
  border-radius: 999px;
  cursor: pointer;
  transition: filter 0.15s, transform 0.15s, background 0.3s, color 0.15s, border-color 0.15s;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-feature-settings: "ss01", "cv11";
}
.btn-primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.btn-primary::after { content: "→"; transition: transform 0.15s; }
.btn-primary:hover:not(:disabled)::after { transform: translateX(3px); }
.btn-ghost {
  background: transparent;
  color: var(--ink-2);
  border-color: var(--line-2);
}
.btn-ghost:hover { color: var(--ink); border-color: var(--ink-2); }
.btn-text {
  background: transparent;
  color: var(--ink-2);
  border: none;
  padding: 10px 0;
  font-size: 14px;
}
.btn-text:hover { color: var(--ink); }
.btn-text.with-arrow::before { content: "←"; margin-right: 6px; }

/* ─── Option cards ─── */
.opts {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.opt {
  background: rgba(255,255,255,0.55);
  border: 1px solid var(--line-2);
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 16px;
  color: var(--ink);
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  letter-spacing: -0.005em;
}
.opt:hover { border-color: var(--ink-3); background: rgba(255,255,255,0.85); }
.opt.is-selected {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 1.5px var(--primary), 0 4px 14px rgba(47, 93, 90, 0.12);
}
.opt-label {
  font-weight: 500;
  flex: 1;
}
.opt-sub {
  display: block;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-2);
  margin-top: 4px;
  line-height: 1.45;
}
.opt-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--line-2);
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  transition: all 0.15s;
}
.opt.is-selected .opt-check {
  border-color: var(--primary);
  background: var(--primary);
}
.opt.is-selected .opt-check::after {
  content: "";
  position: absolute;
  inset: 5px;
  background: #fff;
  border-radius: 50%;
}
.opt-check.multi { border-radius: 5px; }
.opt.is-selected .opt-check.multi { background: var(--primary); }
.opt.is-selected .opt-check.multi::after {
  content: "✓";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  background: none;
  border-radius: 0;
}

.opts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* ─── Age screen ─── */
.age-display {
  text-align: center;
  margin-bottom: 32px;
}
.age-number {
  font-family: var(--serif);
  font-style: italic;
  font-size: 144px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.04em;
  margin: 0;
  font-variant-numeric: tabular-nums;
}
.age-suffix {
  font-family: var(--sans);
  font-size: 14px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 8px;
  font-weight: 500;
}

// ─── Single-select option list ─────────────────────────────────────
function OptList({ options, value, onChange, multi = false, exclusive = [], grid = false }) {
  const isSelected = (id) => multi ? (value || []).includes(id) : value === id;
  const handle = (id) => {
    if (!multi) {
      onChange(id);
      return;
    }
    const cur = value || [];
    let next;
    if (cur.includes(id)) {
      next = cur.filter(x => x !== id);
    } else {
      // exclusive (e.g. "skip", "none") — clear others; or remove exclusive if picking another
      if (exclusive.includes(id)) {
        next = [id];
      } else {
        next = cur.filter(x => !exclusive.includes(x)).concat(id);
      }
    }
    onChange(next);
  };
  return (
    <div className={grid ? "opts opts-grid" : "opts"}>
      {options.map(o => (
        <button key={o.id} type="button"
          className={"opt" + (isSelected(o.id) ? " is-selected" : "")}
          onClick={() => handle(o.id)}>
          <div>
            <div className="opt-label">{o.label}</div>
            {o.sub && <div className="opt-sub">{o.sub}</div>}
          </div>
          <div className={"opt-check" + (multi ? " multi" : "")}></div>
        </button>
      ))}
    </div>
  );
}

// ─── Review screen ────────────────────────────────────────────────
function ReviewScreen({ data, onEdit, onBack, onContinue, stepIdx, total }) {
  const fmt = {
    sex: () => SEX_AT_BIRTH.find(s => s.id === data.sex)?.label || '—',
    genders: () => (data.genders || []).map(id => GENDERS.find(g => g.id === id)?.label).filter(Boolean).join(', ') || '—',
    pronouns: () => (data.pronouns || []).map(id => PRONOUNS.find(p => p.id === id)?.label).filter(Boolean).join(', ') || '—',
    orientations: () => (data.orientations || []).map(id => ORIENTATIONS.find(o => o.id === id)?.label).filter(Boolean).join(', ') || '—',
    races: () => (data.races || []).map(id => RACES.find(r => r.id === id)?.label).filter(Boolean).join(', ') || '—',
    age: () => String(data.age || '—'),
    body: () => {
      const list = Object.entries(data.organStates || {})
        .filter(([_, st]) => st && st !== 'na')
        .map(([oid, st]) => {
          const organ = ORGANS.find(o => o.id === oid);
          const state = ORGAN_STATES.find(s => s.id === st);
          if (!organ) return null;
          return `${organ.short}${st !== 'present' ? ` (${state?.label.toLowerCase()})` : ''}`;
        })
        .filter(Boolean);
      return list.length ? list.join(', ') : '—';
    },
    hpv: () => {
      const map = { yes: 'Yes, full series', partial: 'Yes, partial', no: 'No', unsure: 'Don\'t know', skip: 'Prefer not to say' };
      return map[data.hpv] || '—';
    },
    family: () => {
      const list = (data.familyMembers || []).map(id => FAMILY.find(f => f.id === id)?.label).filter(Boolean);
      return list.length ? list.join(', ') : '—';
    },
    smoking: () => {
      if (data.smoked === true) return 'Yes — 20+ years';
      if (data.smoked === 'some') return 'Yes, less than 20 years';
      if (data.smoked === false) return 'No, never regularly';
      if (data.smoked === null) return 'Prefer not to say';
      return '—';
    },
  };

  const rows = [
    { id: 'sex', key: 'Sex assigned at birth' },
    { id: 'gender', key: 'Gender identity', read: 'genders' },
    { id: 'pronouns', key: 'Pronouns' },
    { id: 'orientation', key: 'Sexual orientation', read: 'orientations' },
    { id: 'race', key: 'Race / ethnicity', read: 'races' },
    { id: 'age', key: 'Age' },
    { id: 'body', key: 'Body inventory' },
    { id: 'hpv', key: 'HPV vaccine' },
    { id: 'family', key: 'Family history of cancer', read: 'family' },
    { id: 'smoking', key: 'Smoking history' },
  ];

  return (
    <QCard
      stepIdx={stepIdx} total={total}
      title={<span>Let's <em>review</em> before we generate.</span>}
      subtitle="Click any row to change your answer. Nothing leaves this device."
      onBack={onBack}
      onNext={onContinue}
      nextLabel="See my screening guide"
    >
      <div className="review-grid">
        {rows.map(r => {
          const val = fmt[r.read || r.id]();
          return (
            <div key={r.id} className="review-row">
              <div className="review-key">{r.key}</div>
              <div className={"review-val" + (val === '—' ? ' empty' : '')}>{val}</div>
              <button className="review-edit" onClick={() => onEdit(r.id)}>Edit</button>
            </div>
          );
        })}
      </div>
    </QCard>
  );
}

    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Close">×</button>

        <h2>About this tool</h2>

        <p>
          A patient-facing prototype that recommends cancer screenings based on what a person
          actually has — their organs, age, family history, and behaviors — rather than their
          stated gender identity. Designed for the waiting room: a few minutes on a phone or
          shared device before walking in to clinic.
        </p>

        <h3>Why it exists</h3>
        <p>
          Trans and gender-diverse patients are systematically under-screened for cancer. A
          common reason: clinic intake systems use sex or gender to drive screening
          recommendations, even when those don't reflect the patient's actual anatomy. A trans
          woman keeps her prostate. A trans man with a cervix still needs cervical screening.
          A nonbinary person with breast tissue is at risk for breast cancer.
        </p>

        <h3>How it works</h3>
        <p>
          The intake separates identity (gender, pronouns, orientation, race) from anatomy.
          The screening logic only ever uses anatomy + age + history. Identity is collected so
          the resulting guide can use language that feels right, and so the doctor handoff
          is honest about who's in front of them.
        </p>

        <h3>Data &amp; privacy</h3>
        <p>
          Everything stays in your browser. Nothing is sent anywhere — there is no backend,
          no analytics, no logging. You can close the tab and your answers are gone.
        </p>

        <h3>Sources</h3>
        <p>
          Recommendations adapted from USPSTF, American Cancer Society, and the WPATH Standards of
          Care 8 guidance on screening trans and gender-diverse adults. Specific cadences and
          age cutoffs are simplified; a clinician should always make the final call.
        </p>

        <h3>Authors &amp; contact</h3>
        <p>
          Designed and built by Anderson Junjie Lu, PhD candidate in Epidemiology and Clinical
          Research at Stanford. For feedback, corrections, or to report a problem, see the
          contact page on the homepage.
        </p>
      </div>
    </div>
  );
}

// ─── Welcome screen — language carousel + big serif "Hello" ──────
function WelcomeScreen({ onStart }) {
  const [chosen, setChosen] = useStateW('en');
  const [open, setOpen] = useStateW(false);
  const [cycleIdx, setCycleIdx] = useStateW(0);

  // headline cycles through "Hello" in different languages
  useEffectW(() => {
    if (open) return;
    const t = setInterval(() => {
      setCycleIdx(i => (i + 1) % WEB_LANGUAGES.length);
    }, 2400);
    return () => clearInterval(t);
  }, [open]);

  const cur = WEB_LANGUAGES.find(l => l.code === chosen) || WEB_LANGUAGES[0];
  const cyc = WEB_LANGUAGES[cycleIdx];

  // deterministic non-overlapping placement around the central column
  const floatHellos = useMemoW(() => {
    let seed = 11;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const zones = [
      { x: [2, 18],  y: [6, 94] },   // left strip
      { x: [82, 98], y: [6, 94] },   // right strip
      { x: [22, 78], y: [1, 8] },    // top band
      { x: [22, 78], y: [90, 97] },  // bottom band
    ];
    // estimate a bounding rect (vw% x vh%) for each label, then place greedily
    // with a min separation, retrying up to N times per item.
    const placed = [];
    const minSepX = 12; // % of viewport width
    const minSepY = 7;  // % of viewport height
    const items = [];
    for (let i = 0; i < WEB_LANGUAGES.length; i++) {
      const l = WEB_LANGUAGES[i];
      const z = zones[i % zones.length];
      const size = 24 + rnd() * 22;
      let x = 0, y = 0, ok = false;
      for (let attempt = 0; attempt < 40; attempt++) {
        x = z.x[0] + rnd() * (z.x[1] - z.x[0]);
        y = z.y[0] + rnd() * (z.y[1] - z.y[0]);
        ok = placed.every(p => Math.abs(p.x - x) > minSepX || Math.abs(p.y - y) > minSepY);
        if (ok) break;
      }
      if (!ok) continue; // skip if no room
      placed.push({ x, y });
      items.push({
        text: l.hello,
        code: l.code,
        x, y, size,
        peak: 0.14 + rnd() * 0.16,
        appearDelay: (rnd() * 8).toFixed(2),
      });
    }
    return items;
  }, []);

  return (
    <div className="welcome-stage fade-in" style={{ position: 'relative', overflow: 'hidden' }}>
      <div className="welcome-hellos-bg" aria-hidden="true">
        {floatHellos.map((h, i) => (
          <span
            key={i}
            className="welcome-hello-float"
            style={{
              left: h.x.toFixed(2) + '%',
              top: h.y.toFixed(2) + '%',
              fontSize: h.size.toFixed(1) + 'px',
              '--peak': h.peak.toFixed(3),
              animationDelay: h.appearDelay + 's',
            }}
          >
            {h.text}
          </span>
        ))}
      </div>

      <div className="welcome-clinic" style={{ position: 'relative', zIndex: 1 }}>Cancer Screening Guide · 2026</div>

      <div className="welcome-headline" style={{ position: 'relative', zIndex: 1 }}>
        <span className="welcome-headline-cycle" key={cyc.code}>
          {cyc.hello}.
        </span>
      </div>

      <div className="welcome-lang-pill-wrap" style={{ position: 'relative', zIndex: 2 }}>
        <button
          className="welcome-lang-pill"
          onClick={() => setOpen(v => !v)}
          aria-expanded={open}
        >
          <span className="welcome-lang-pill-hello">{cur.hello}</span>
          <span className="welcome-lang-pill-native">{cur.native}</span>
          <span className="welcome-lang-pill-chev">{open ? '▲' : '▼'}</span>
        </button>
        {open && (
          <div className="welcome-lang-pop">
            {WEB_LANGUAGES.map(l => (
              <button
                key={l.code}
                className={"welcome-lang-pop-item" + (l.code === chosen ? " is-active" : "")}
                onClick={() => { setChosen(l.code); setOpen(false); }}
              >

                <span style={{ color: 'var(--ink-3)' }}>{l.native}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      <button className="welcome-cta" onClick={onStart} style={{ position: 'relative', zIndex: 1 }}>
        Continue in {cur.native}
      </button>

      <div className="welcome-meta">
        <div className="welcome-meta-item">
          <span className="welcome-meta-key">Time</span>

        <div className="welcome-meta-item">

  );
}

function WebApp() {
  // Phase: 'welcome' | 'intake' | 'review' | 'generating' | 'results'
  const [phase, setPhase] = useStateW('welcome');
  const [step, setStep] = useStateW('sex');
  const [completed, setCompleted] = useStateW(new Set());
  const [aboutOpen, setAboutOpen] = useStateW(false);
  const [theme, setTheme] = useStateW('teal');

  // Form data
  const [sex, setSex] = useStateW(null);
  const [genders, setGenders] = useStateW([]);
  const [pronouns, setPronouns] = useStateW([]);
  const [orientations, setOrientations] = useStateW([]);
  const [races, setRaces] = useStateW([]);
  const [age, setAge] = useStateW(35);
  const [organStates, setOrganStates] = useStateW({});
  const [hpv, setHpv] = useStateW(null);
  const [familyMembers, setFamilyMembers] = useStateW([]);
  const [smoked, setSmoked] = useStateW(undefined);

  // Apply theme reactively
  useEffectW(() => { applyWebTheme(theme); }, [theme]);

  const stepIdx = STEP_IDS.indexOf(step);

  // Mark current step done and advance
  const advance = () => {
    setCompleted((prev) => new Set([...prev, step]));
    if (stepIdx < STEP_IDS.length - 1) {
      setStep(STEP_IDS[stepIdx + 1]);
    } else {
      setPhase('review');
    }
  };
  const goBack = () => {
    if (stepIdx > 0) {
      setStep(STEP_IDS[stepIdx - 1]);
    } else {
      setPhase('welcome');
    }
  };
  const jumpTo = (id) => {
    if (completed.has(id)) {
      setStep(id);
      setPhase('intake');
    }
  };

  // Edit from review screen
  const editFromReview = (id) => {
    setStep(id);
    setPhase('intake');
  };

  const startOver = () => {
    setSex(null); setGenders([]); setPronouns([]); setOrientations([]); setRaces([]);
    setAge(35); setOrganStates({}); setHpv(null); setFamilyMembers([]); setSmoked(undefined);
    setCompleted(new Set());
    setStep('sex');
    setPhase('welcome');
  };

  // ─ Render the current question (in 'intake' phase)
  const renderQuestion = () => {
    const copy = STEP_COPY[step];
    const cardProps = {
      stepIdx, total: STEP_IDS.length,
      title: copy.title, subtitle: copy.sub,
      onBack: goBack,
      onNext: advance,
    };

    switch (step) {
      case 'sex':
        return <QCard {...cardProps} nextDisabled={!sex}>
          <OptList options={SEX_AT_BIRTH} value={sex} onChange={setSex} />
        </QCard>;
      case 'gender':
        return <QCard {...cardProps} nextDisabled={(genders || []).length === 0}>
          <OptList options={GENDERS} value={genders} onChange={setGenders} multi exclusive={['skip']} grid />
        </QCard>;
      case 'pronouns':
        return <QCard {...cardProps} nextDisabled={(pronouns || []).length === 0}>
          <OptList options={PRONOUNS} value={pronouns} onChange={setPronouns} multi exclusive={['skip']} grid />
        </QCard>;
      case 'orientation':
        return <QCard {...cardProps} nextDisabled={(orientations || []).length === 0}>
          <OptList options={ORIENTATIONS} value={orientations} onChange={setOrientations} multi exclusive={['skip']} grid />
        </QCard>;
      case 'race':
        return <QCard {...cardProps} nextDisabled={(races || []).length === 0}>
          <OptList options={RACES} value={races} onChange={setRaces} multi exclusive={['skip']} grid />
        </QCard>;
      case 'age':
        return <AgeScreen {...cardProps}
          nextDisabled={!age || age < 18}
          value={age} onChange={setAge} />;
      case 'body':
        return <BodyScreen {...cardProps}
          nextDisabled={Object.keys(organStates).length === 0}
          value={organStates} onChange={setOrganStates} sex={sex} />;
      case 'hpv':
        return <QCard {...cardProps} nextDisabled={!hpv}>
          <OptList options={[
            { id: 'yes',     label: 'Yes, full series' },
            { id: 'partial', label: 'Yes, but not the full series' },
            { id: 'no',      label: 'No' },
            { id: 'unsure',  label: 'I don\'t know' },
            { id: 'skip',    label: 'Prefer not to say' },
          ]} value={hpv} onChange={setHpv} />
        </QCard>;
      case 'family':
        return <QCard {...cardProps} nextDisabled={(familyMembers || []).length === 0}>
          <OptList options={FAMILY} value={familyMembers} onChange={setFamilyMembers}
            multi exclusive={['none']} grid />
        </QCard>;
      case 'smoking':
        const smokedKey = smoked === true ? 'long' : smoked === 'some' ? 'some' : smoked === false ? 'no' : smoked === null ? 'skip' : null;
        return <QCard {...cardProps} nextDisabled={!smokedKey} nextLabel="Continue to review">
          <OptList options={[
            { id: 'long', label: 'Yes — 20+ years' },
            { id: 'some', label: 'Yes, but less than 20 years' },
            { id: 'no',   label: 'No, never regularly' },
            { id: 'skip', label: 'Prefer not to say' },
          ]} value={smokedKey}
          onChange={(v) => {
            if (v === 'long') setSmoked(true);
            else if (v === 'some') setSmoked('some');
            else if (v === 'no') setSmoked(false);
            else setSmoked(null);
          }} />
        </QCard>;
      default:
        return null;
    }
  };

  // Build screening data for results
  const organsForBuild = organsFromStates(organStates);
  const familyHistoryBool = (familyMembers || []).length > 0 && !familyMembers.includes('none');
  const identityLabel = (genders || []).map(id => GENDERS.find(g => g.id === id)?.label).filter(Boolean).join(', ') || '—';

  // ─ Topbar (always present)
  const topbar = (
    <header className="topbar">
      <div className="topbar-mark">
        <span className="dot"></span>
        <a href="../">Cancer Screening <span className="ital">Guide</span></a>

        <ThemePicker theme={theme} onChange={setTheme} />
      </div>

  );

  // ─ Render by phase
  let content;
  if (phase === 'welcome') {
    content = <WelcomeScreen onStart={() => { setPhase('intake'); setStep('sex'); }} />;
  } else if (phase === 'intake') {
    content = (
      <main className="stage">
        <Stepper currentStep={step} completed={completed} onJump={jumpTo} currentCopy={STEP_COPY[step]} />
        <div>
          {renderQuestion()}
        </div>
      </main>
    );
  } else if (phase === 'review') {
    content = (
      <main className="stage">
        <Stepper currentStep="review" completed={new Set(STEP_IDS)} onJump={jumpTo}
          currentCopy={{ whyTitle: 'Almost done', why: 'Review your answers, edit anything that\'s off, and we\'ll generate your screening guide.' }} />
        <div>
          <ReviewScreen
            stepIdx={STEP_IDS.length}
            total={STEP_IDS.length}
            data={{ sex, genders, pronouns, orientations, races, age, organStates, hpv, familyMembers, smoked }}
            onEdit={editFromReview}
            onBack={() => { setPhase('intake'); setStep('smoking'); }}
            onContinue={() => setPhase('generating')} />
        </div>
      </main>
    );
  } else if (phase === 'generating') {
    content = <GeneratingScreen onDone={() => setPhase('results')} />;
  } else if (phase === 'results') {
    content = <ResultsPage
      data={{
        age,
        identityLabel,
        organs: organsForBuild.size > 0 ? organsForBuild : new Set(['colon','lungs']),
        smoked: smoked === true,
        familyHistory: familyHistoryBool,
        hpv,
      }}
      onRestart={startOver}
      onPrint={() => window.print()} />;
  }

  return (
    <React.Fragment>
      <Aura />
      {topbar}
      {content}
      <AboutModal open={aboutOpen} onClose={() => setAboutOpen(false)} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WebApp />);

</script>
</body>
</html>
